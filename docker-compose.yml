services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./.env
    volumes:
      - ./agents:/agents:ro
      - ./skills:/skills:ro
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  db:
    image: ankane/pgvector:v0.5.1
    env_file: ./.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-swmaster}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
