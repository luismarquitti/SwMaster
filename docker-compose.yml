services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./.env
    volumes:
      - ./agents:/data/agents:ro
      - ./skills:/data/skills:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
